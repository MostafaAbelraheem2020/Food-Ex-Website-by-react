    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Custom Fonts: Plus Jakarta Sans & Work Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "tertiary": "#874538",
              "primary": "#046453",
              "secondary": "#b3272a",
              "background": "#f9f9f9",
              "primary-container": "#2d7d6b",
              "on-primary": "#ffffff",
              "surface": "#f9f9f9",
              "on-surface": "#1a1c1c",
              "on-surface-variant": "#3f4945",
              "surface-container-low": "#f3f3f3",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#e8e8e8",
              "surface-container-highest": "#e2e2e2",
              "secondary-container": "#fc5d59",
            },
            fontFamily: {
              "plus-jakarta": ["Plus Jakarta Sans", "sans-serif"],
              "work-sans": ["Work Sans", "sans-serif"],
            },
            borderRadius: {
              "4xl": "2rem",
            }
          },
        },
      }
    </script>
    <style>
        .editorial-shadow {
        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-product-fade {
        animation: fadeInUp 0.5s ease-out forwards;
      }
    </style>
    <title>Food Ex | Product Details</title>
